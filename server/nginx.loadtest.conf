limit_req_zone $binary_remote_addr zone=loadtest_login_limit:10m rate=600r/m;

gzip on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types application/json application/javascript text/css text/plain image/svg+xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 220m;

    add_header X-Loadtest-Instance "smart-procurement-loadtest" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /api/v1/auth/login {
        limit_req zone=loadtest_login_limit burst=120 nodelay;
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000/api/v1/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /app/loadtest-uploads/;
        add_header Cache-Control "public, max-age=60";
    }

    location / {
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
