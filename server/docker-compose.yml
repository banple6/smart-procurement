services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../data:/app/data
      - ../uploads:/app/uploads
      - ../private_uploads:/app/private_uploads
      - ../backups:/app/backups
      - ../releases:/app/releases
      - ../logs:/app/logs
    expose:
      - "8000"

  push-worker:
    build: .
    restart: unless-stopped
    command: python -m app.workers.push_worker
    env_file:
      - .env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../uploads:/app/uploads:ro
      - ../logs:/var/log/nginx
