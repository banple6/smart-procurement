<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>扫码登录 - 三公鲜配</title>
    <link rel="stylesheet" href="/admin-assets/dashboard.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <header class="login-brand" aria-label="系统信息">
        <img class="login-badge emblem-badge" src="/admin-assets/police-badge.svg" alt="警徽" />
        <h1>三公鲜配</h1>
        <p>单位食材申领与配送协同平台</p>
      </header>
      <section class="login-panel" aria-label="扫码登录">
        <h2>扫码登录</h2>
        <div id="qrBox" class="qr-box" aria-live="polite">
          <div class="skeleton square"></div>
        </div>
        <p id="loginStatus" class="login-status">正在生成二维码...</p>
        <p id="qrTimer" class="qr-timer">二维码将在 --:-- 后失效</p>
        <button id="refreshQr" class="primary-button" type="button">刷新二维码</button>
        <footer class="login-footnote">
          <span>本系统仅限内部授权人员使用</span>
          <span>请勿将二维码发送给他人</span>
        </footer>
      </section>
      <section class="login-panel download-panel" aria-label="App 下载">
        <h2>还没有安装 App？</h2>
        <p>请先安装三公鲜配 App，使用已登录账号扫码进入网页端。</p>
        <dl id="loginDownloadInfo" class="status-list compact">
          <dt>当前版本</dt><dd>正在获取...</dd>
          <dt>更新时间</dt><dd>正在获取...</dd>
          <dt>安装包大小</dt><dd>正在获取...</dd>
        </dl>
        <a id="loginDownloadButton" class="primary-button link-button" href="/download">下载 Android App</a>
        <a class="text-link" href="/help">查看安装和扫码说明</a>
      </section>
    </main>
    <script src="/admin-assets/login.js" defer></script>
  </body>
</html>
