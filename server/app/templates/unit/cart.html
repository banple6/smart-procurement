<section id="cartView" class="unit-view">
  <section class="unit-panel">
    <div class="panel-title"><h3>采购清单</h3><button id="clearCartButton" type="button">清空</button></div>
    <div id="cartList" class="simple-list"></div>
    <div class="cart-summary">
      <span id="cartDeliveryPoint">配送点：--</span>
      <strong id="cartTotal">¥0.00</strong>
    </div>
    <textarea id="orderNote" placeholder="备注（可选）"></textarea>
    <button id="submitOrderButton" class="primary-action full" type="button">提交订单</button>
  </section>
</section>
