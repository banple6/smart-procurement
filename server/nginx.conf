limit_req_zone $binary_remote_addr zone=login_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=qr_create_limit:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=qr_poll_limit:10m rate=180r/m;
limit_req_zone $binary_remote_addr zone=qr_mobile_limit:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 220m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=30 nodelay;
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000/api/v1/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/web-auth/qr/challenges {
        limit_req zone=qr_create_limit burst=40 nodelay;
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000/api/v1/web-auth/qr/challenges;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/web-auth/qr/challenges/[^/]+/status$ {
        limit_req zone=qr_poll_limit burst=80 nodelay;
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/mobile/web-auth/qr {
        limit_req zone=qr_mobile_limit burst=30 nodelay;
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        alias /app/assets/;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location /uploads/ {
        alias /app/uploads/;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        add_header Cache-Control "no-store" always;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
